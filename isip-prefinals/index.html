<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        button {
            cursor: pointer;
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
        }

        button:hover {
            background-color: #e64a19;
        }

        main {
            padding: 2rem;
            max-width: 1000px;
            margin: auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product-card img {
            max-width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
        }

        .price {
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .hidden {
            display: none;
        }

        .cart-modal {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background-color: white;
            box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            padding: 20px;
            z-index: 1000;
        }

        .close-cart {
            cursor: pointer;
            font-size: 2rem;
            float: right;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .cart-total {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MyStore</div>
        <button id="cart-btn">Cart (<span id="cart-count">0</span>)</button>
    </header>

    <main>
        <h2>Featured Products</h2>
        <div id="product-list" class="product-grid"></div>
    </main>

    <div id="cart-modal" class="cart-modal hidden">
        <div class="cart-content">
            <span class="close-cart">&times;</span>
            <h3>Your Cart</h3>
            <div id="cart-items">
                <p>Your cart is empty.</p>
            </div>
            <div class="cart-total">
                Total: $<span id="cart-total">0</span>
            </div>
            <button id="checkout-btn">Checkout</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Wireless Headphones", price: 79.99, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=300&fit=crop" },
            { id: 2, name: "Smart Watch", price: 199.99, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&h=300&fit=crop" },
            { id: 3, name: "Leather Bag", price: 149.99, image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=300&h=300&fit=crop" },
            { id: 4, name: "Running Shoes", price: 89.99, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&h=300&fit=crop" },
            { id: 5, name: "Sunglasses", price: 59.99, image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=300&h=300&fit=crop" }
        ];

        let cart = [];

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            setupCartModal();
        });

        function renderProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p class="price">$${product.price}</p>
                    <button onclick="addToCart(${product.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartCount();
            alert(`${product.name} added to cart!`);
        }

        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        function setupCartModal() {
            const modal = document.getElementById('cart-modal');
            const cartBtn = document.getElementById('cart-btn');
            const closeBtn = document.querySelector('.close-cart');
            const checkoutBtn = document.getElementById('checkout-btn');

            cartBtn.addEventListener('click', () => {
                modal.classList.remove('hidden');
                renderCartItems();
            });

            closeBtn.addEventListener('click', () => {
                modal.classList.add('hidden');
            });

            checkoutBtn.addEventListener('click', () => {
                if(cart.length > 0) {
                    alert(`Thank you for buying $${document.getElementById('cart-total').innerText} worth of stuff!`);
                    cart = [];
                    updateCartCount();
                    renderCartItems();
                    modal.classList.add('hidden');
                } else {
                    alert("Cart is empty!");
                }
            });
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                container.innerHTML = "<p>Your cart is empty.</p>";
                totalEl.innerText = "0";
                return;
            }

            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>$${item.price}</span>
                    </div>
                `;
            }).join('');

            total = Math.round(total * 100) / 100;
            totalEl.innerText = total;
        }
    </script>
</body>
</html>
